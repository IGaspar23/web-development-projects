<div class="weather">
    <div class="left">
        <h2 class="temp">{{ temp }}&#176;C</h2>
        <h3 class="city">{{ city }}</h3>
    </div>

    <div class="right">
        <div class="icon">
            <img src="http://openweathermap.org/img/w/{{ icon }}.png" width="100" alt="">
        </div>

        <div class="condition">
            <p>{{ description }}</p>
            <p>{{ day }}</p>
        </div>
    </div>
</div>

{% if ai_summary %}
<div class="ai-summary">
    <p> <strong>Weathy says:</strong> {{ ai_summary }}</p>
</div>
{% else %}
    <p> <strong>Weathy says:</strong> No summary available.</p>
{% endif %}
